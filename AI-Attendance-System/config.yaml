# SYSTEM CONFIGURATION - AI Attendance Pipeline (Optimized for Accuracy + Performance)

# CORE SETTINGS
tracker: "deepsort"            # Tracking algorithm
num_detectors: 2               # Number of face detection workers
num_trackers: 4                # OPTIMIZED: Increased from 1 to 4 for parallel processing
track_timeout_seconds: 3.0     # Track timeout before sending to recognizer

# CAMERA INGESTION SETTINGS
# IMPROVED: Higher resolution for better face detection accuracy
ingest_width: 640              # IMPROVED: 480 → 640 (better face crops for recognition)
ingest_height: 360             # IMPROVED: 270 → 360 (balanced quality/performance)

# DETECTION SETTINGS
# These define frame size for face detection.
detector_width: 640
detector_height: 360

# ADAPTIVE BACKPRESSURE CONTROL
# OPTIMIZED: Reduced queue sizes, better backpressure
detector_queue_high: 200        # OPTIMIZED: 400 → 200 (drop frames earlier, less memory)
detector_queue_low: 100         # OPTIMIZED: 250 → 100 (more responsive to load)
throttle_cooldown_seconds: 5.0  # Pause before resuming camera ingestion

# API SETTINGS (SECURITY)
api_token: "my_secure_token_123"
api_allowed_origins:
  - "http://localhost:3000"
  - "http://127.0.0.1:3000"

# PERFORMANCE TUNING
# OPTIMIZED: Smaller queues prevent memory waste and reduce latency
frame_queue_max: 30             # OPTIMIZED: 50 → 30
detector_queue_max: 200         # OPTIMIZED: 500 → 200
tracker_output_queue_max: 200   # OPTIMIZED: 500 → 200
recognition_batch_queue_max: 50 # OPTIMIZED: 100 → 50

# DYNAMIC TRACKER SCALING
max_trackers: 8                 # Allow up to 8 trackers during peak load
scale_up_threshold: 150         # OPTIMIZED: 300 → 150 (more responsive)
scale_down_threshold: 75        # OPTIMIZED: 150 → 75

# API SERVER
api_port: 8082

# DATABASE SETTINGS (SMAP)
# DB_URL is read from the .env file in this directory (AI-Attendance-System/.env)
# Never hardcode credentials here — use AI-Attendance-System/.env instead.
MAX_DB_CONNECTIONS: 10

# RECOGNITION THRESHOLDS — InsightFace buffalo_l (w600k_r50)
# Discrimination on real faces:
#   Same person:      0.65 – 1.00 cosine similarity
#   Different person: 0.005 – 0.07 cosine similarity
# → Gap of ~0.75+  (vs old model's 0.07 gap — 10× better)
#
COSINE_THRESHOLD: 0.40
MAJORITY_THRESHOLD: 1

# RECOGNITION BLOCK (Read by pipeline_worker.py)
recognition:
  cosine_threshold: 0.55      # Higher threshold for single-frame mode (was 0.40 with voting)
  majority_threshold: 1       # Single frame = single vote
  margin_threshold: 0.20      # Gap required between winner and runner-up (different employee)

selector:
  top_k: 1                    # Single best frame per track (1 InsightFace call instead of 3)
  track_timeout_seconds: 2.0
  trigger_threshold: 0.5
  sent_mute_seconds: 8.0
